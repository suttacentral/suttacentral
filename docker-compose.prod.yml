services:
  sc-flask:
    build:
      target: prod
    restart: always
    env_file:
      - server/env/.prod.env
    volumes:
      - ./client/:/opt/sc/frontend
    ports:
      - '5001:5000'

  sc-nginx:
    restart: always
    volumes:
      - ./client/:/opt/sc/static
    command: bash entry-point.prod.sh
    environment:
      - NODE_ENV='production'

  sc-arangodb:
    restart: always
    env_file:
      - server/env/.prod.env
    ports:
      - '8529:8529'

  sc-swagger:
    restart: always
    ports:
      - '8080:8080'
    environment:
      - "API_URL=https://suttacentral.net/api/spec"

  sc-frontend:
    command: npm run build
    volumes:
      - ./client/build:/opt/sc/frontend/build
