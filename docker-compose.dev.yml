services:
  sc-flask:
    build:
      target: dev
    env_file:
      - server/env/.dev.env
    volumes:
      - ./client/:/opt/sc/frontend
    ports:
      - '5001:5000'
    develop:
      # Create a `watch` configuration to update the app
      # https://docs.docker.com/compose/file-watch/#compose-watch-versus-bind-mounts
      watch:
        # Sync the local pyproject.toml file with the container
        - action: sync
          path: ./server/pyproject.toml
          target: /opt/sc/sc-flask/pyproject.toml

        # Sync the local project source directory with the container
        - action: sync
          path: ./server/src
          target: /opt/sc/sc-flask/src

        # Sync the local project tests directory with the container
        - action: sync
          path: ./server/tests
          target: /opt/sc/sc-flask/tests

        # Rebuild the image if dependencies change by checking uv.lock
        - action: rebuild
          path: ./server/uv.lock



  sc-nginx:
    volumes:
      - ./client/:/opt/sc/static
    command: bash entry-point.dev.sh

  sc-arangodb:
    env_file:
      - server/env/.dev.env
    ports:
      - '8529:8529'

  sc-swagger:
    ports:
      - '8080:8080'

  sc-frontend:
    command: npm run dev
    volumes:
      - ./client/elements:/opt/sc/frontend/elements
      - ./client/utils:/opt/sc/frontend/utils
      - ./client/img:/opt/sc/frontend/img
      - ./client/localization:/opt/sc/frontend/localization
      - ./client/index.html:/opt/sc/frontend/index.html
      - ./client/redux-store.js:/opt/sc/frontend/redux-store.js
      - ./client/webpack.config.js:/opt/sc/frontend/webpack.config.js
      - ./client/localization/elements:/opt/sc/frontend/localization/elements
    ports:
      - '3000:3000'

