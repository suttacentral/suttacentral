services:
  sc-flask:
    volumes:
      - ./client/:/opt/sc/frontend
    env_file:
      - server/env/.test.env

  sc-nginx:
    volumes:
      - ./client/:/opt/sc/static
    command: bash entry-point.test.sh

  sc-arangodb:
    env_file:
      - server/env/.test.env
    ports:
      - '8529:8529'

  sc-frontend:
    command: npm run build
